name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Show Forge version
        run: |
          forge --version

      - name: Run license boundary check
        run: |
          chmod +x scripts/check-licenses.sh
          ./scripts/check-licenses.sh

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test

  predict:
    name: PredictClaw package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          python -m pip install uv

      - name: Sync predict dependencies
        working-directory: predict
        run: |
          uv sync

      - name: Run predict tests
        working-directory: predict
        run: |
          uv run pytest -q

      - name: Verify PredictClaw help
        working-directory: predict
        run: |
          uv run python scripts/predictclaw.py --help
