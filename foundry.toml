[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 200

# Allow fork tests to read deployment artifacts (e.g. deployments/bsc-testnet.json).
# Keep permissions minimal: read-only, scoped to ./deployments.
fs_permissions = [
    { access = "read", path = "./deployments" }
]

remappings = [
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts-upgradeable/lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Coverage: both `forge coverage` and `forge coverage --ir-minimum` are supported.
# The execute() function is split into _validateMandate/_validateAllowlists/_executeActions
# to keep each function within legacy codegen's 16-slot stack limit.

[profile.ci]
# CI profile — inherits all defaults above.
# Explicit section so that FOUNDRY_PROFILE=ci in GitHub Actions resolves correctly.
